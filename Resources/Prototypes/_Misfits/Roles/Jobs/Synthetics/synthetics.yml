# Robot Spawn job: single job for all player-controlled synthetic robots. #Misfits Change
# Players choose their robot type (Mr. Handy, Protectron, Mr. Gutsy, Assaultron) as a
# species in the character customization menu via the Robot Type variant picker panel.
# Access is gated via the job-specific whitelist (admin: jobwhitelistadd <player> RobotSpawn).
# On spawn, StationSpawningSystem uses profile.Species -> species.Prototype -> correct robot entity.

- type: job
  id: RobotSpawn
  name: job-name-robot-spawn
  description: job-description-robot-spawn
  playTimeTracker: RobotSpawn
  icon: JobIconBorg
  supervisors: job-supervisors-synthetic
  canBeAntag: false
  setPreference: true
  overrideConsoleVisibility: true
  whitelisted: true # #Misfits Change: per-job whitelist via jobwhitelistadd
  hideWithoutWhitelist: true # #Misfits Change
  spawnLoadout: false
  applyTraits: false

- type: playTimeTracker
  id: RobotSpawn
