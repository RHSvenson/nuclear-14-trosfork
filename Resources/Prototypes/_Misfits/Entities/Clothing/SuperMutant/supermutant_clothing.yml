# #Misfits Change - Super Mutant species-specific clothing items.
# Tagged with SuperMutantWearable to match supermutant inventory template whitelist.
# Only Super Mutants can equip these items in body-worn slots.

# --- Jumpsuit ---
- type: entity
  parent: UnsensoredClothingUniformBase
  id: ClothingSuperMutantJumpsuit
  name: super mutant garb
  description: A crude set of garments cobbled together from scavenged materials, sized for a super mutant's massive frame.
  components:
  - type: Sprite
    sprite: _Misfits/Clothing/SuperMutant/jumpsuit.rsi
  - type: Clothing
    sprite: _Misfits/Clothing/SuperMutant/jumpsuit.rsi
  - type: Tag
    tags:
    - SuperMutantWearable

# --- Outer Clothing ---
- type: entity
  parent: ClothingOuterBase
  id: ClothingSuperMutantOuterClothing
  name: super mutant armor
  description: Scrap metal and leather lashed together into crude but effective armor, built to fit a super mutant.
  components:
  - type: Sprite
    sprite: _Misfits/Clothing/SuperMutant/outerclothing.rsi
  - type: Clothing
    sprite: _Misfits/Clothing/SuperMutant/outerclothing.rsi
  - type: Tag
    tags:
    - SuperMutantWearable

